name = "MarkowitzFormalization"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MarkowitzFormalization"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
weak.linter.style.header = false # project is not part of mathlib; skip the mandatory-header check
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "MarkowitzFormalization"

# Comparator audit triples (Challenge/Solution). Not in defaultTargets, so a plain
# `lake build` is unaffected; build explicitly with `lake build Audit.<Target>.*`.
[[lean_lib]]
name = "Audit"
globs = ["Audit.+"]
