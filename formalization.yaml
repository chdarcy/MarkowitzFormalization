fidelity:
  mathematical_scope: >-
    Faithful to the deterministic Markowitz mean-variance optimization layer used after a
    mean vector and covariance matrix have been specified. The central optimization,
    frontier, GMVP, efficient-frontier, and two-fund separation statements are represented
    directly in Lean.
  divergences: >-
    The formalization does not derive expected returns or covariances from random variables.
    The risk-free asset, squared Sharpe ratio, squared capital market line, tangency
    portfolio, and one-fund separation are now formalized. CAPM and the security-market-line
    (beta pricing) remain future extensions rather than failures of the current formalization.
  statement_style: >-
    Theorems are stated over an arbitrary finite asset type n with Fintype and DecidableEq
    assumptions where needed. Positive definiteness is encoded through Mathlib's matrix
    PosDef API. Efficiency compares against all budget-feasible portfolios, not merely
    frontier portfolios.

review:
  status: "self-reviewed"
  reviewers:
    - "Christopher Darcy"
    - "ChatGPT-assisted checkpoint audits"
    - "Claude Code build and declaration inventory checks"
  notes: >-
    The source was repeatedly audited by running lean_build and checking theorem inventories.
    The final development (risky-asset core plus risk-free extension) has no sorry/admit/stop
    and a clean build apart from cosmetic style diagnostics. Four headline theorems are
    additionally validated against the Lean FRO Comparator (independent re-elaboration of a
    Mathlib-only statement plus kernel acceptance of the delegating proof); all four report
    "Your solution is okay!" See COMPARATOR.md. This is not external peer review.

