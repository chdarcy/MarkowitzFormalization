version: "v0.1"

project:
  name: "MarkowitzFormalization"
  title: "Lean 4 formalization of risky-asset Markowitz mean-variance portfolio theory"
  authors:
    - "Christopher Darcy"
  repository: "MarkowitzFormalization"
  license: "Apache-2.0"
  scope_summary: >-
    A Lean 4 / Mathlib formalization of the deterministic mean-vector / covariance-matrix
    layer of Markowitz portfolio optimization. The project assumes a finite universe of
    risky assets, a given expected-return vector μ, and a positive-definite covariance
    matrix Σ. It formalizes the risky-asset frontier, optimality, uniqueness, the frontier
    variance equation, the global minimum variance portfolio, the efficient frontier, and
    two-fund separation. It additionally formalizes the risk-free extension (implicit
    cash-weight model): the squared Sharpe ratio, the risk-free frontier portfolio with its
    constraint satisfaction, variance closed form, optimality and uniqueness, the squared
    capital market line, the tangency portfolio, and one-fund separation. The probabilistic
    construction of μ and Σ from random variables is treated as an upstream modelling layer
    and is not formalized in this project. A subset of headline theorems is additionally
    validated against the Lean FRO Comparator via the audit triples in Audit/ (see
    COMPARATOR.md).

sources:
  - title: "Markowitz lecture notes"
    authors:
      - "Cristopher Salvi"
    id: "local-file: markowitz_lecture_notes.tex"
    type: "lecture notes"
    license: "course material / not redistributed"
    author_contacted: "n/a"
    prior_work: "Primary mathematical reference for the formalization plan and theorem coverage."
  - title: "Portfolio Selection"
    authors:
      - "Harry Markowitz"
    id: "Journal of Finance, 1952"
    type: "journal article"
    license: "publisher copyright"
    author_contacted: "n/a"
    prior_work: "Classical source for mean-variance portfolio theory."
  - title: "Lean 4 and Mathlib documentation"
    authors:
      - "Lean FRO / Mathlib contributors"
    id: "software-documentation"
    type: "software documentation"
    license: "open source"
    author_contacted: "n/a"
    prior_work: "Used for Lean syntax, Mathlib APIs, matrices, finite sums, dot products, and order/linear algebra lemmas."

status:
  scope: >-
    The Markowitz theory is formalized end-to-end at the algebraic
    mean-vector/covariance-matrix level. The risky-asset development covers the budget
    constraint, expected return, variance and risk, covariance positive definiteness,
    Markowitz feasibility and optimality, uniqueness of the optimizer, the closed-form
    frontier portfolio, the frontier variance equation in closed and completed-square
    forms, the global minimum variance portfolio, Pareto efficiency of the upper branch,
    inefficiency of the lower branch, and two-fund separation. The risk-free development
    (implicit cash-weight model) covers the excess-return vector, squared Sharpe ratio and
    its positivity, the risk-free frontier portfolio, its constraint satisfaction, variance
    closed form, optimality and uniqueness, the squared capital market line, the tangency
    portfolio (budget normalisation, zero cash weight, expected/total return), and one-fund
    separation.
  build_status: "clean"
  build_jobs: 2602
  sorry_count: 0
  admit_count: 0
  custom_axioms: []
  known_warnings:
    - "Trivial warnings surpressed"
  axioms:
    - "propext"
    - "Classical.choice"
    - "Quot.sound"
  limitations:
    - >-
      The formalization starts from primitive μ : n → ℝ and covM : Matrix n n ℝ.
      It does not construct these objects from random variables, expectations, covariance,
      or measure-theoretic probability spaces.
    - >-
      CAPM and the security-market-line (beta-pricing) statements are not yet formalized.
      The risk-free asset, squared capital market line, tangency portfolio, and one-fund
      separation ARE now formalized (see MarkowitzFormalization/RiskFree.lean).
    - >-
      The hyperbola rearrangement in the (σ, m) plane is not formalized; this is treated as
      cosmetic because the variance parabola and completed-square form are proved directly.
  main_results:
    - declaration: "portfolioVariance_nonneg"
      file: "MarkowitzFormalization/Portfolio.lean"
      sorry_count: 0
      description: "Portfolio variance is nonnegative under positive semidefiniteness."
    - declaration: "portfolioVariance_eq_zero_of_posDef"
      file: "MarkowitzFormalization/Portfolio.lean"
      sorry_count: 0
      description: "Under positive definiteness, zero variance forces the portfolio vector to be zero."
    - declaration: "frontierD_pos"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "The Markowitz denominator D = BC - A² is strictly positive in a nondegenerate market."
    - declaration: "frontierPortfolio_feasible_of_market"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "The closed-form frontier portfolio satisfies the budget and target-return constraints."
    - declaration: "frontierPortfolio_optimal_of_market"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "The closed-form frontier portfolio minimizes variance among portfolios with the same target return."
    - declaration: "frontierPortfolio_unique_of_market"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "A feasible portfolio with the same objective value as the frontier portfolio is equal to it."
    - declaration: "frontierPortfolio_optimal_unique_of_market"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "Any Markowitz-optimal portfolio equals the closed-form frontier portfolio."
    - declaration: "frontierPortfolio_variance_closed_form_of_market"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "The frontier variance equals (C m² - 2 A m + B) / D."
    - declaration: "frontierPortfolio_variance_completed_square"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "The frontier variance equals 1/C + (C/D)(m - A/C)²."
    - declaration: "frontierPortfolio_gmvp_weights"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "The global minimum variance portfolio has weights (1/C) Σ⁻¹1."
    - declaration: "frontierPortfolio_gmvp_variance"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "The GMVP variance is 1/C."
    - declaration: "frontierPortfolio_variance_ge_gmvp"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "Every frontier portfolio has variance at least the GMVP variance."
    - declaration: "frontierPortfolio_two_fund"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "Every frontier portfolio is an affine combination of any two distinct frontier portfolios."
    - declaration: "frontierPortfolio_not_efficient_of_lt_gmvp"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "Frontier portfolios below the GMVP return are not Pareto efficient."
    - declaration: "frontierPortfolio_efficient_of_ge_gmvp"
      file: "MarkowitzFormalization/Frontier.lean"
      sorry_count: 0
      description: "Frontier portfolios at or above the GMVP return are Pareto efficient."
    - declaration: "sharpeSquared_pos"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "The squared Sharpe ratio eᵀΣ⁻¹e is strictly positive when the excess-return vector is nonzero."
    - declaration: "rfFrontierPortfolio_totalExpectedReturn"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "The risk-free frontier portfolio attains its target total expected return m."
    - declaration: "rfFrontierPortfolio_variance"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "The risk-free frontier portfolio has variance (m - rf)² / (eᵀΣ⁻¹e)."
    - declaration: "rfFrontierPortfolio_optimal"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "Among risky exposure vectors attaining total return m, the risk-free frontier portfolio minimizes variance."
    - declaration: "rfFrontierPortfolio_unique"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "The minimal-variance risky exposure attaining total return m is unique and equals the risk-free frontier portfolio."
    - declaration: "capitalMarketLine_squared"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "Squared capital market line: σ²·(eᵀΣ⁻¹e) = (m - rf)²."
    - declaration: "tangencyPortfolio_budget"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "When the tangency denominator is nonzero the tangency portfolio is fully invested (risky weights sum to 1)."
    - declaration: "tangencyPortfolio_totalExpectedReturn"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "The tangency portfolio has total expected return rf + S/D."
    - declaration: "rfFrontierPortfolio_one_fund"
      file: "MarkowitzFormalization/RiskFree.lean"
      sorry_count: 0
      description: "One-fund separation: every risk-free frontier portfolio is a scalar multiple of the single tangency portfolio."

files:
  - path: "MarkowitzFormalization/Basic.lean"
    role: "project bootstrap / basic imports"
  - path: "MarkowitzFormalization/Portfolio.lean"
    role: "portfolio weights, budget set, expected return, variance, risk, covariance assumptions, market assumptions"
  - path: "MarkowitzFormalization/Frontier.lean"
    role: "risky-asset Markowitz frontier, optimality, uniqueness, GMVP, efficient frontier, two-fund separation"
  - path: "MarkowitzFormalization/RiskFree.lean"
    role: "completed risk-free extension: excess return, squared Sharpe ratio, risk-free frontier portfolio (constraint satisfaction, variance, optimality, uniqueness), squared capital market line, tangency portfolio, one-fund separation"
  - path: "Audit/"
    role: "Lean FRO Comparator audit triples (Challenge/Solution/comparator.json) validating headline theorems; not in defaultTargets. See COMPARATOR.md and CORRESPONDENCE.md."

